format = "$directory$git_branch$git_status$cmd_duration$character"

add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold blue"
format            = "[$path]($style) "

[git_branch]
symbol = ""
style  = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style     = "red"
format    = "([$all_status$ahead_behind]($style) )"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
modified  = "*"
staged    = "+"
untracked = "?"
deleted   = "✘"
conflicted = "!"

[cmd_duration]
min_time = 2000
format   = "[${duration}](bold yellow) "

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[rust]
disabled = true

[java]
disabled = true
