format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$rust\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo  = true
style             = "bold blue"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
format    = '([\[$all_status$ahead_behind\]]($style) )'
style     = "bold red"
conflicted = "⚡"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified  = "!"
staged    = "+"
renamed   = "»"
deleted   = "✘"

[nodejs]
symbol = " "
format = "[$symbol($version)]($style) "

[python]
symbol = " "
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[golang]
symbol = " "

[rust]
symbol = " "

[cmd_duration]
min_time = 2000
format   = "took [$duration](bold yellow) "
